<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="STYLE.CSS">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="inputElement">
            <input type="text" placeholder="Enter your Location" class="CityInput" id="Cityname">
            <button class="BtnElement" onclick="getWeather()">
                <i class="bi bi-search"></i>
            </button>
        </div>
        <div id="weatherApp" class="DisplayEle">

        </div>
    </div>
    <script>
        
async function getWeather(){
    let city=document.getElementById("Cityname").value;
    let WeatherDiv=document.getElementById("weatherApp");
    let APIKey="YOUR_API_KEY";
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${APIKey}&units=metric`;
    console.log(city);
    console.log(url);
     try {
        const response = await fetch(url);
        const data = await response.json();

        if (!response.ok) {
            throw new Error("City not found");
        }


        WeatherDiv.innerHTML = `
            <h2>${data.name}</h2>
            <p>🌡 Temperature: ${data.main.temp} °C</p>
            <p>💧 Humidity: ${data.main.humidity}%</p>
            <p>🌬 Wind Speed: ${data.wind.speed} m/s</p>
        `;
    }
    catch(error) {
        WeatherDiv.innerHTML = `<h2>${error.message}</h2>`;
    }

}
    </script>
</body>
</html>
